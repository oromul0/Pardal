<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pardal — Avaliações de Food Trucks</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-brand">
      <h1>Pardal</h1>
    </div>
    <div class="topbar-controls">
      <select id="pracaSelect" class="praca-select" aria-label="Selecionar praça">
        <option value="">Carregando praças...</option>
      </select>
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" stroke-width="1.5"/>
          <line x1="10.5" y1="10.5" x2="15" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input id="searchInput" type="text" class="search-input" placeholder="Buscar praça ou food truck..." aria-label="Buscar" />
        <ul id="searchResults" class="search-results hidden"></ul>
      </div>
    </div>
  </header>

  <main id="app">
    <div id="map" aria-label="Mapa"></div>
    <aside id="sidebar" class="sidebar hidden" aria-live="polite">
      <button id="closeSidebar" class="close-btn" aria-label="Fechar painel">&times;</button>
      <div id="sidebarContent"></div>
    </aside>
  </main>

  <div id="status" class="status"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="js/inference.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
