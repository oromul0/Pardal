<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Praça Jardim Napen — Food Trucks</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <h1>Praça Jardim Napen</h1>
    <span class="subtitle">Avaliações dos food trucks</span>
  </header>

  <main id="app">
    <div id="map" aria-label="Mapa da Praça Jardim Napen"></div>
    <aside id="sidebar" class="sidebar hidden" aria-live="polite">
      <button id="closeSidebar" class="close-btn" aria-label="Fechar painel">×</button>
      <div id="sidebarContent"></div>
    </aside>
  </main>

  <div id="status" class="status"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="js/inference.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
